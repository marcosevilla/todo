<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Tray icon: crosshair symbol only, transparent background -->
  <!-- Works on both light and dark menu bars (black with slight transparency) -->

  <!-- Outer circle -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="black" stroke-width="1.8"/>

  <!-- Crosshair lines -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="black" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="4" x2="16" y2="28" stroke="black" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="black"/>
</svg>
